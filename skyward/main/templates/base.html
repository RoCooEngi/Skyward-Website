{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Skyward{% endblock %}</title>
    <style>
        /* Общие стили для body */
        body {
            margin: 0;
            font-family: Brush Script MT, cursive;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background-image: url("{% static 'images/wallpaper_main.jpg' %}");
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        /* Стили для шапки и подвала */
        .header, .footer {
            background: linear-gradient(to right, #6a11cb, #2575fc);
            color: white;
            padding: 10px 20px;
        }

        /* Стили для навигационной панели */
        .nav {
            display: flex;
            align-items: center;
            gap: 50px;
        }

        /* Стили для логотипа */
        .nav img {
            height: 50px;
            margin-right: 50px;
        }

        /* Стили для ссылок в навигационной панели */
        .nav a {
            color: white;
            text-decoration: none;
            font-size: 18px;
            white-space: nowrap;
        }

        /* Стили для основного контента */
        .content {
            background-color: rgba(255, 255, 255, 0);
            padding: 20px;
            flex: 1;
        }

        /* Стили для подвала */
        .footer {
            background: linear-gradient(to right, #6a11cb, #2575fc);
            color: white;
            padding: 20px;
            width: 100%;
            bottom: 0;
        }

        .footer-content {
            display: flex;
            justify-content: space-between;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Левая половина подвала */
        .footer-left {
            flex: 1; /* Занимает половину пространства */
            display: flex;
            flex-direction: column;
            align-items: center; /* Выравнивание по центру */
            gap: 10px;
        }

        .footer-left a {
            color: white;
            text-decoration: none;
        }

        /* Правая половина подвала */
        .footer-right {
            flex: 1; /* Занимает половину пространства */
            display: flex;
            justify-content: center; /* Выравнивание по центру */
            align-items: center;
        }

        .contacts {
            display: flex;
            flex-direction: column;
            align-items: center; /* Выравнивание по центру */
            gap: 10px;
        }

        .contacts-title {
            font-size: 18px;
            font-weight: bold;
        }

        .social-icons {
            display: flex;
            gap: 20px;
        }

        .social-icons img {
            width: 30px;
            height: auto;
        }

        .email {
            font-size: 14px;
            color: white;
        }

        /* Основной контейнер для текста и видео */
        .content-container {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
            gap: 70px;
            padding: 20px;
            max-width: 1500px;
            margin: 0 auto;
            width: 100%;
            margin-top: 50px;
        }

        /* Контейнер для текста */
        .text-container {
            flex: 1;
            text-align: center;
            color: white;
            min-width: 300px;
            position: relative; /* Для позиционирования рамки */
            padding: 20px; /* Отступы внутри контейнера */
            background: linear-gradient(135deg, rgb(156, 76, 241), rgb(28, 75, 157));
            border-radius: 20px; /* Скругленные углы */
            box-shadow: 0 0 20px rgba(106, 17, 203, 0.3); /* Легкая тень для объема */
        }

        /* Контейнер для видео */
        .video-container {
            flex: 1;
            max-width: 800px;
            min-width: 300px;
        }

        /* Стили для видео */
        video {
            width: 100%;
            height: auto;
            border-radius: 10px;
        }

        /* Анимация для текста */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .text-container h1,
        .text-container p {
            opacity: 0;
            animation: fadeInUp 1s ease-out forwards;
        }

        .text-container p {
            animation-delay: 0.5s;
        }

        /* Анимация для видео */
        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .video-container {
            opacity: 0;
            animation: scaleIn 1s ease-out forwards;
            animation-delay: 1s;
        }
        /* Стили для контейнера с символами и текстом */
        .symbols-container {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            padding: 20px;
            max-width: 1500px;
            margin: 0 auto;
            width: 100%;
            margin-top: 50px;
        }

        /* Стили для левой и правой колонок */
        .symbols-left, .symbols-right {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Стили для пары символ-текст */
        .symbol-text-pair {
            display: flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(135deg, rgb(156, 76, 241), rgb(28, 75, 157));
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(106, 17, 203, 0.3);
        }

        /* Стили для изображения символа */
        .symbol-text-pair img {
            width: 50px;
            height: 50px;
        }

        /* Стили для текста рядом с символом */
        .symbol-text-pair p {
            color: white;
            margin: 0;
            font-size: 18px;
            text-align: center;
        }

        /* Стили для заголовка "Целевая аудитория" */
        .target-audience-title {
            text-align: center;
            color: white; /* Белый цвет текста */
            font-size: 32px;
            margin-top: 50px;
            margin-bottom: 20px;
            opacity: 0;
            animation: fadeInUp 1s ease-out forwards;
            animation-delay: 1.5s; /* Задержка для анимации */
            text-shadow: 
                -2px -2px 0 #6a11cb, /* Фиолетовая тень вверх-влево */
                2px -2px 0 #6a11cb,  /* Фиолетовая тень вверх-вправо */
                -2px 2px 0 #6a11cb,  /* Фиолетовая тень вниз-влево */
                2px 2px 0 #6a11cb;   /* Фиолетовая тень вниз-вправо */
        }

        /* Анимация для пар символ-текст */
        .symbols-container {
            opacity: 0;
            animation: fadeInUp 1s ease-out forwards;
            animation-delay: 2s; /* Задержка для анимации */
        }

        /* Адаптация для мобильных устройств */
        @media (max-width: 768px) {
            .nav {
                flex-wrap: wrap;
                justify-content: center;
                gap: 20px;
            }
            .nav img {
                margin-right: 0;
            }
            .nav a {
                font-size: 16px;
            }
            .content-container {
                flex-direction: column;
                gap: 20px;
                margin-top: 20px;
            }
            .text-container {
                min-width: unset;
            }
            .video-container {
                max-width: 100%;
                min-width: unset;
            }
            .symbols-container {
                flex-direction: column;
                gap: 10px;
                margin-top: 20px;
            }
        
            .symbols-left, .symbols-right {
                gap: 10px;
            }
        
            .symbol-text-pair {
                flex-direction: column;
                text-align: center;
            }
        
            .symbol-text-pair img {
                margin-bottom: 10px;
            }
            .footer-content {
                flex-direction: column;
                gap: 20px;
            }
        
            .footer-left, .footer-right {
                align-items: center;
                text-align: center;
            }
        }

        /* Стили для десктопов */
        @media (min-width: 769px) {
            .text-container h1 {
                font-size: 36px;
            }
            .text-container p {
                font-size: 18px;
            }
            .video-container {
                max-width: 800px;
            }
            .symbol-text-pair {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <!-- Шапка -->
    <header class="header">
        <nav class="nav">
            <a href="{% url 'meme' %}">
                <img src="{% static 'images/logo_spacex.png' %}" alt="Logo">
            </a>
            <a href="{% url 'home' %}">Главная</a>
            <a href="#">Решения</a>
            <a href="#">О нас</a>
        </nav>
    </header>

    <!-- Основной контент -->
    <main class="content">
        {% block content %}
        {% endblock %}
    </main>

    <!-- Подвал -->
    <footer class="footer">
        <div class="footer-content">
            <div class="footer-left">
                <div>Skyward &copy; {% now "Y" %}</div>
                <a href="{% url 'privacy_pdf' %}" target="_blank">Политика конфиденциальности</a>
            </div>
            <div class="footer-right">
                <div class="contacts">
                    <div class="social-icons">
                        <a href={% url "telegram" %}>
                            <img src="{% static 'images/Telegram_Logo.png' %}" alt="Telegram">
                        </a>
                        <a href={% url "vk" %}>
                            <img src="{% static 'images/VK_Logo.png' %}" alt="VK">
                        </a>
                    </div>
                    <div class="email">usachevaVA@gmail.com</div>
                </div>
            </div>
        </div>
    </footer>
</body>
</html>
