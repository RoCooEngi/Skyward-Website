{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VK QR Code</title>
    <style>
        /* Общие стили для body */
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
        }

        /* Контейнер для QR-кода и текста */
        .qr-container {
            text-align: center;
        }

        /* Стили для изображения QR-кода */
        .qr-container img {
            width: 500px; /* Размер QR-кода */
            height: auto;
            margin-bottom: 20px; /* Отступ между QR-кодом и текстом */
        }

        /* Стили для текста */
        .qr-container p {
            font-size: 18px;
            color: #333;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="qr-container">
        <!-- Изображение QR-кода -->
        <a href="https://vk.com/im/convo/635405861" target="_blank">
            <img src="{% static 'images/qr_code_vk.png' %}" alt="QR Code VK">
        </a>
        <!-- Текст под QR-кодом -->
        <p>Нажмите для продолжения</p>
    </div>
</body>
</html>
